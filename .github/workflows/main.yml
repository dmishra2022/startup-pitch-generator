name: Build and Test Flow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package

    - name: Run Tests
      # Note: fullPipelineProducesValidOutput will be skipped due to missing OPENAI_API_KEY
      # To enable it, you would add:
      # env:
      #   OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: mvn test

    - name: Build Docker Image
      run: docker build -t pitch-generator:latest .
