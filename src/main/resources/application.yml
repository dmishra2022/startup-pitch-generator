spring:
  application:
    name: startup-pitch-generator
  thymeleaf:
    cache: false
    mode: HTML
    encoding: UTF-8
  task:
    execution:
      pool:
        core-size: 4
        max-size: 10
        queue-capacity: 50
      thread-name-prefix: pitch-async-
  cache:
    type: simple
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080
  error:
    include-message: always

# LangChain4j OpenAI configuration
langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY:demo-key}
      model-name: gpt-4o-mini
      temperature: 0.7
      max-tokens: 4096
      timeout: 120s
      log-requests: false
      log-responses: false

# App-specific settings
app:
  pipeline:
    session-ttl-minutes: 60
    max-concurrent-sessions: 20
    sse-timeout-seconds: 300
  agent:
    market-analyst:
      max-retries: 2
    financial-analyst:
      max-retries: 3
    judge:
      enabled: true

# Actuator for health checks (useful for native image deployments)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.startup.pitch: DEBUG
    dev.langchain4j: INFO
